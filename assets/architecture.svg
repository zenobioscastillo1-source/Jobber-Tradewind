<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" width="1200" height="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1626"/><stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.3"/><stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="agentglow" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.18"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="430" rx="20" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="429" rx="20" fill="none" stroke="#1e2a40"/>

  <!-- arrows -->
  <g>
    <line x1="358" y1="145" x2="446" y2="145" stroke="url(#arrow)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="446,138 459,145 446,152" fill="#2dd4bf"/>
    <line x1="753" y1="145" x2="841" y2="145" stroke="url(#arrow)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="841,138 854,145 841,152" fill="#2dd4bf"/>
  </g>

  <!-- Workflows card -->
  <rect x="60" y="70" width="290" height="150" rx="14" fill="#111c2e" stroke="#22d3ee" stroke-opacity="0.55"/>
  <text x="84" y="112" fill="#22d3ee" font-size="12.5" font-weight="700" letter-spacing="1.5">THE INSTRUCTIONS</text>
  <text x="84" y="150" fill="#eef3f9" font-size="25" font-weight="800">Workflows</text>
  <text x="84" y="182" fill="#aab6c6" font-size="13.5">Plain-language playbooks —</text>
  <text x="84" y="201" fill="#aab6c6" font-size="13.5">the steps for each task.</text>

  <!-- Agent card (emphasized) -->
  <rect x="455" y="70" width="290" height="150" rx="14" fill="url(#agentglow)"/>
  <rect x="455" y="70" width="290" height="150" rx="14" fill="#0f1f2b" stroke="#2dd4bf" stroke-width="1.6"/>
  <text x="479" y="112" fill="#2dd4bf" font-size="12.5" font-weight="700" letter-spacing="1.5">THE DECISION-MAKER</text>
  <text x="479" y="150" fill="#ffffff" font-size="25" font-weight="800">Agent</text>
  <text x="479" y="182" fill="#bcddd7" font-size="13.5">The AI. Reads the workflow</text>
  <text x="479" y="201" fill="#bcddd7" font-size="13.5">and makes the judgment calls.</text>

  <!-- Tools card -->
  <rect x="850" y="70" width="290" height="150" rx="14" fill="#111c2e" stroke="#38bdf8" stroke-opacity="0.55"/>
  <text x="874" y="112" fill="#38bdf8" font-size="12.5" font-weight="700" letter-spacing="1.5">THE EXECUTION</text>
  <text x="874" y="150" fill="#eef3f9" font-size="25" font-weight="800">Tools</text>
  <text x="874" y="182" fill="#aab6c6" font-size="13.5">Predictable scripts that do</text>
  <text x="874" y="201" fill="#aab6c6" font-size="13.5">the exact, repeatable work.</text>

  <!-- connector down to knowledge base -->
  <line x1="600" y1="222" x2="600" y2="298" stroke="#c084fc" stroke-width="2" stroke-dasharray="5 5"/>
  <polygon points="593,292 600,304 607,292" fill="#c084fc"/>
  <text x="616" y="266" fill="#c084fc" font-size="12.5" font-weight="600">grounds every customer-facing claim</text>

  <!-- Knowledge base -->
  <rect x="300" y="300" width="600" height="104" rx="14" fill="#16122a" stroke="#c084fc" stroke-opacity="0.7" stroke-dasharray="7 5"/>
  <g transform="translate(832,328)" fill="none" stroke="#c084fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 44V8a2 2 0 0 1 2-2h36v44H4a2 2 0 0 0-2 2z" transform="scale(1)"/>
    <path d="M12 16h22M12 24h16"/>
  </g>
  <text x="330" y="338" fill="#c084fc" font-size="12.5" font-weight="700" letter-spacing="1.5">THE ONLY SOURCE OF FACTS</text>
  <text x="330" y="368" fill="#ffffff" font-size="22" font-weight="800">Knowledge base</text>
  <text x="330" y="393" fill="#b6a9d6" font-size="13.5">If a fact isn't confirmed here, the agent escalates to the owner — it never guesses.</text>
</svg>
