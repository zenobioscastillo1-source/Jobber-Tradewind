<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 488" width="1200" height="488" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1626"/><stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="488" rx="20" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="487" rx="20" fill="none" stroke="#1e2a40"/>
  <style>.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}</style>

  <!-- ============ LEFT: before / escalates ============ -->
  <rect x="40" y="64" width="510" height="376" rx="14" fill="#121420" stroke="#f87171" stroke-opacity="0.4"/>
  <text x="64" y="102" fill="#f87171" font-size="17" font-weight="800">Before — knowledge empty</text>
  <rect x="434" y="84" width="92" height="26" rx="13" fill="#2c1717"/><circle cx="450" cy="97" r="4" fill="#f87171"/><text x="462" y="101" fill="#fca5a5" font-size="11.5" font-weight="700">escalates</text>
  <line x1="64" y1="120" x2="526" y2="120" stroke="#23304a"/>
  <text x="64" y="148" fill="#9aa6b6" font-size="13">Lead asks about mowing price + a bed cleanup.</text>

  <rect x="60" y="164" width="470" height="120" rx="10" fill="#0b1320" stroke="#23304a"/>
  <text class="mono" x="78" y="192" fill="#c2cdda" font-size="12.5">Hi Dana, thanks for reaching out! I'd like to</text>
  <text class="mono" x="78" y="213" fill="#c2cdda" font-size="12.5">confirm a couple of details before I can give</text>
  <text class="mono" x="78" y="234" fill="#c2cdda" font-size="12.5">you a price — I'll get right back to you.</text>
  <text class="mono" x="78" y="262" fill="#6f7b8c" font-size="11.5">(states no service or price it can't verify)</text>

  <text x="64" y="318" fill="#7e8aa0" font-size="11.5" font-weight="700" letter-spacing="1.5">ESCALATED TO OWNER</text>
  <rect x="64" y="330" width="156" height="26" rx="13" fill="#2c1717"/><text class="mono" x="76" y="347" fill="#fca5a5" font-size="11.5" font-weight="600">price not confirmed</text>
  <rect x="228" y="330" width="168" height="26" rx="13" fill="#2c1717"/><text class="mono" x="240" y="347" fill="#fca5a5" font-size="11.5" font-weight="600">service not confirmed</text>

  <g transform="translate(64,398)"><circle cx="8" cy="0" r="8" fill="none" stroke="#f87171" stroke-width="2"/><path d="M8 -4v4M8 4h0.01" stroke="#f87171" stroke-width="2" stroke-linecap="round"/></g>
  <text class="mono" x="84" y="403" fill="#f87171" font-size="13" font-weight="700">status: needs_owner_input</text>

  <!-- ============ center arrow ============ -->
  <circle cx="600" cy="252" r="26" fill="#101b2c" stroke="#2a3a55"/>
  <path d="M590 252h18M601 244l9 8-9 8" fill="none" stroke="#5eead4" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ============ RIGHT: after / grounded ============ -->
  <rect x="650" y="64" width="510" height="376" rx="14" fill="#121420" stroke="#4ade80" stroke-opacity="0.45"/>
  <text x="674" y="102" fill="#4ade80" font-size="17" font-weight="800">After — sample knowledge loaded</text>
  <rect x="1044" y="84" width="92" height="26" rx="13" fill="#10291b"/><circle cx="1060" cy="97" r="4" fill="#4ade80"/><text x="1072" y="101" fill="#86efac" font-size="11.5" font-weight="700">grounded</text>
  <line x1="674" y1="120" x2="1136" y2="120" stroke="#23304a"/>
  <text x="674" y="148" fill="#9aa6b6" font-size="13">Same lead. Same pipeline. Now every claim is backed.</text>

  <rect x="670" y="164" width="470" height="120" rx="10" fill="#0b1320" stroke="#23304a"/>
  <text class="mono" x="688" y="190" fill="#d6e2ee" font-size="12.5">Hi Dana! You're in our Austin service area, and</text>
  <text class="mono" x="688" y="211" fill="#d6e2ee" font-size="12.5">weekly mowing starts at $45/visit; bed refreshes</text>
  <text class="mono" x="688" y="232" fill="#d6e2ee" font-size="12.5">run $150–$400 by size. The estimate's free —</text>
  <text class="mono" x="688" y="253" fill="#d6e2ee" font-size="12.5">what day works for a quick look?</text>

  <text x="674" y="318" fill="#7e8aa0" font-size="11.5" font-weight="700" letter-spacing="1.5">GROUNDED IN</text>
  <g class="mono" font-size="11.5" font-weight="600">
    <rect x="674" y="330" width="100" height="26" rx="13" fill="#10291b"/><text x="688" y="347" fill="#86efac">services.md</text>
    <rect x="782" y="330" width="92" height="26" rx="13" fill="#10291b"/><text x="796" y="347" fill="#86efac">pricing.md</text>
    <rect x="882" y="330" width="126" height="26" rx="13" fill="#10291b"/><text x="896" y="347" fill="#86efac">service-area.md</text>
    <rect x="1016" y="330" width="84" height="26" rx="13" fill="#10291b"/><text x="1030" y="347" fill="#86efac">voice.md</text>
  </g>

  <path d="M668 398l5 5 9-9" transform="translate(0,-4)" fill="none" stroke="#4ade80" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="mono" x="690" y="403" fill="#4ade80" font-size="13" font-weight="700">status: drafted · ready for approval</text>

  <!-- caption -->
  <text x="600" y="468" fill="#8b95a6" font-size="13.5" text-anchor="middle">Same lead, same pipeline — the only difference is <tspan fill="#5eead4" font-weight="700">confirmed knowledge</tspan>. (All data is fictional sample.)</text>
</svg>
