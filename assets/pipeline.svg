<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1626"/><stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="540" rx="20" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="539" rx="20" fill="none" stroke="#1e2a40"/>

  <!-- connectors -->
  <g stroke-width="2.5" stroke-linecap="round">
    <line x1="96" y1="128" x2="96" y2="146" stroke="#2a3a55"/>
    <line x1="96" y1="204" x2="96" y2="222" stroke="#2a3a55"/>
    <line x1="96" y1="280" x2="96" y2="298" stroke="#2a3a55"/>
    <line x1="96" y1="356" x2="96" y2="374" stroke="#2a3a55"/>
    <line x1="96" y1="432" x2="96" y2="450" stroke="#fbbf24" stroke-dasharray="4 5" stroke-opacity="0.8"/>
  </g>

  <!-- ROW 1 — Jobber -->
  <rect x="60" y="70" width="1080" height="58" rx="12" fill="#111c2e" stroke="#1e2a40"/>
  <circle cx="96" cy="99" r="15" fill="#34d399"/><text x="96" y="104" fill="#06121f" font-size="13" font-weight="800" text-anchor="middle">1</text>
  <text x="130" y="96" fill="#eef3f9" font-size="16.5" font-weight="700">Jobber — a new lead arrives</text>
  <text x="130" y="116" fill="#9aa6b6" font-size="13">A new Request and its linked customer. Read only.</text>
  <rect x="1012" y="86" width="104" height="26" rx="13" fill="#0e2a27"/><circle cx="1028" cy="99" r="4" fill="#2dd4bf"/><text x="1040" y="103" fill="#5eead4" font-size="11.5" font-weight="700">read-only</text>

  <!-- ROW 2 — Read & flag (Layer 1) -->
  <rect x="60" y="146" width="1080" height="58" rx="12" fill="#111c2e" stroke="#1e2a40"/>
  <circle cx="96" cy="175" r="15" fill="#22d3ee"/><text x="96" y="180" fill="#06121f" font-size="13" font-weight="800" text-anchor="middle">2</text>
  <text x="130" y="172" fill="#eef3f9" font-size="16.5" font-weight="700">Read &amp; flag</text>
  <text x="130" y="192" fill="#9aa6b6" font-size="13">Ingest the lead; flag likely duplicate / incomplete records.</text>
  <rect x="966" y="162" width="150" height="26" rx="13" fill="#10291b"/><circle cx="982" cy="175" r="4" fill="#4ade80"/><text x="994" y="179" fill="#4ade80" font-size="11.5" font-weight="700">LAYER 1 · BUILT</text>

  <!-- ROW 3 — Sheet -->
  <rect x="60" y="222" width="1080" height="58" rx="12" fill="#111c2e" stroke="#1e2a40"/>
  <circle cx="96" cy="251" r="15" fill="#38bdf8"/><text x="96" y="256" fill="#06121f" font-size="13" font-weight="800" text-anchor="middle">3</text>
  <text x="130" y="248" fill="#eef3f9" font-size="16.5" font-weight="700">Google Sheet — the review desk</text>
  <text x="130" y="268" fill="#9aa6b6" font-size="13">Every finding surfaces here for the owner to see.</text>
  <rect x="1024" y="238" width="92" height="26" rx="13" fill="#0c2436"/><circle cx="1040" cy="251" r="4" fill="#38bdf8"/><text x="1052" y="255" fill="#7dd3fc" font-size="11.5" font-weight="700">surface</text>

  <!-- ROW 4 — Draft + propose (Layer 2) -->
  <rect x="60" y="298" width="1080" height="58" rx="12" fill="#111c2e" stroke="#1e2a40"/>
  <circle cx="96" cy="327" r="15" fill="#818cf8"/><text x="96" y="332" fill="#06121f" font-size="13" font-weight="800" text-anchor="middle">4</text>
  <text x="130" y="324" fill="#eef3f9" font-size="16.5" font-weight="700">Draft + propose</text>
  <text x="130" y="344" fill="#9aa6b6" font-size="13">Grounded reply (email + SMS) and cleanup proposals — each with its provenance.</text>
  <rect x="966" y="314" width="150" height="26" rx="13" fill="#10291b"/><circle cx="982" cy="327" r="4" fill="#4ade80"/><text x="994" y="331" fill="#4ade80" font-size="11.5" font-weight="700">LAYER 2 · BUILT</text>

  <!-- ROW 5 — Approval gate -->
  <rect x="60" y="374" width="1080" height="58" rx="12" fill="#111c2e" stroke="#1e2a40"/>
  <circle cx="96" cy="403" r="15" fill="#c084fc"/><text x="96" y="408" fill="#06121f" font-size="13" font-weight="800" text-anchor="middle">5</text>
  <text x="130" y="400" fill="#eef3f9" font-size="16.5" font-weight="700">Owner approves / edits / rejects</text>
  <text x="130" y="420" fill="#9aa6b6" font-size="13">Nothing proceeds without a human decision.</text>
  <rect x="988" y="390" width="128" height="26" rx="13" fill="#1d1233"/><circle cx="1004" cy="403" r="4" fill="#c084fc"/><text x="1016" y="407" fill="#d8b4fe" font-size="11.5" font-weight="700">approval gate</text>

  <!-- ROW 6 — Execute (Layer 3, planned) -->
  <rect x="60" y="450" width="1080" height="58" rx="12" fill="#15110a" stroke="#fbbf24" stroke-opacity="0.6" stroke-dasharray="7 5"/>
  <circle cx="96" cy="479" r="15" fill="#fbbf24"/><text x="96" y="484" fill="#06121f" font-size="13" font-weight="800" text-anchor="middle">6</text>
  <text x="130" y="476" fill="#f2e6cf" font-size="16.5" font-weight="700">Send + write to Jobber</text>
  <text x="130" y="496" fill="#a99a7e" font-size="13">The only step that changes data or contacts a customer — built last, gated hardest.</text>
  <rect x="952" y="466" width="164" height="26" rx="13" fill="#2e2310"/><circle cx="968" cy="479" r="4" fill="#fbbf24"/><text x="980" y="483" fill="#fbbf24" font-size="11.5" font-weight="700">LAYER 3 · PLANNED</text>
</svg>
